<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors</title>
    <link rel="stylesheet" href="vs.computer.css">
</head>
<body>
    <button class="theme">DarkTheme</button>
    <h1>Stone Paper Scissors</h1>
    <div class="bestes">
        <button class="three">Best of Three</button>
        <button class="five">Best of Five</button>
        <button class="seven">Best of Seven</button>
    </div>
    <div class="images">
        <div class="one"><img src="IMG_20260619_153702.png" alt="" class="stone"><p>stone</p></div>
        <div class="two"><img src="IMG_20260619_153742.png" alt="" class="paper"><p>Paper</p></div>
        <div class="three"><img src="IMG_20260619_153802.png" alt="" class="scissors"><p>Scissors</p></div>
    </div>
    <div class="stats">
        <p>Wins: <p class="wins">0</p></p>
        <p>Lose: <p class="loses">0</p></p>
        <p>Ties: <p class="ties">0</p></p>
        <button class="restart">restart</button>
    </div>
    <div><p class="choiceerror"></p></div>
    <script src="game.js"></script>
</body>
</html>
