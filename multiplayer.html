<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors</title>
    <link rel="stylesheet" href="multiplayer.css">
</head>
<body>
    <button class="theme">DarkTheme</button>
    <h1>Stone Paper Scissors</h1>
    <div class="bestes">
        <button class="three">Best of Three</button>
        <button class="five">Best of Five</button>
        <button class="seven">Best of Seven</button>
    </div>
    <div class="images">
        <p>Player1</p>
        <div class="one"><img src="IMG_20260619_153702.png" alt="" class="stone1"><p>stone</p></div>
        <div class="two"><img src="IMG_20260619_153742.png" alt="" class="paper1"><p>Paper</p></div>
        <div class="three"><img src="IMG_20260619_153802.png" alt="" class="scissors1"><p>Scissors</p></div>
    </div>
    <p class="closeeye1">Player2 close your eye &#128584</p>
    <div class="images">
        <p>Player2</p>
        <div class="one"><img src="IMG_20260619_153702.png" alt="" class="stone2"><p>stone</p></div>
        <div class="two"><img src="IMG_20260619_153742.png" alt="" class="paper2"><p>Paper</p></div>
        <div class="three"><img src="IMG_20260619_153802.png" alt="" class="scissors2"><p>Scissors</p></div>
    </div>
    <p class="closeeye2"></p>
    <div class="stats">
        <p>Player1</p>
        <p>Wins: <p class="wins1">0</p></p>
        <p>Lose: <p class="loses1">0</p></p>
        <p>Ties: <p class="ties1">0</p></p>
    </div>
    <div class="stats">
        <p>Player2</p>
        <p>Wins: <p class="wins2">0</p></p>
        <p>Lose: <p class="loses2">0</p></p>
        <p>Ties: <p class="ties2">0</p></p>
    </div>
    <div><p class="choiceerror"></p></div>
    <script src="multiplayer.js"></script>
</body>
</html>
